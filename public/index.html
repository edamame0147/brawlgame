<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Clone - Frank Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #2c3e50; overflow: hidden; position: fixed; width: 100%; height: 100%; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
        #uiContainer { position: fixed; top: 10px; right: 10px; width: 140px; display: flex; flex-direction: column; gap: 5px; z-index: 5000; }
        .ui-box { background: rgba(0, 0, 0, 0.7); color: white; padding: 8px; border-radius: 8px; font-size: 11px; pointer-events: auto; }
        .pins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .pin-btn { background: #f1c40f; border: 2px solid #fff; border-radius: 10px; padding: 10px; cursor: pointer; font-size: 22px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { text-align: center; color: white; background: #34495e; padding: 25px; border-radius: 20px; }
        input { padding: 12px; font-size: 16px; border-radius: 8px; width: 200px; margin-bottom: 20px; }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .char-btn { padding: 15px; font-size: 14px; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .shelly { background: #3498db; } .spike { background: #2ecc71; } .edgar { background: #9b59b6; } .frank { background: #795548; }
    </style>
</head>
<body>
    <div id="uiContainer">
        <div class="ui-box"><div id="rankingList"></div></div>
        <div class="ui-box">
            <div class="pins-grid">
                <button class="pin-btn" onpointerdown="sendPin('👍')">👍</button>
                <button class="pin-btn" onpointerdown="sendPin('👎')">👎</button>
                <button class="pin-btn" onpointerdown="sendPin('😊')">😊</button>
                <button class="pin-btn" onpointerdown="sendPin('😡')">😡</button>
            </div>
        </div>
    </div>
    <div id="overlay">
        <div class="login-box">
            <h2>Brawl Clone</h2>
            <input type="text" id="nameInput" placeholder="名前..." maxlength="8"><br>
            <div class="char-grid">
                <button class="char-btn shelly" onclick="launchGame('shelly')">シェリー</button>
                <button class="char-btn spike" onclick="launchGame('spike')">スパイク</button>
                <button class="char-btn edgar" onclick="launchGame('edgar')">エドガー</button>
                <button class="char-btn frank" onclick="launchGame('frank')">フランケン</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
