<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Game - Edgar Update</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .login-box { text-align: center; color: white; background: #34495e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; font-size: 18px; border-radius: 8px; border: none; width: 220px; margin-bottom: 20px; }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .char-btn { padding: 15px; font-size: 16px; color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .shelly { background: #3498db; }
        .spike { background: #2ecc71; }
        .edgar { background: #9b59b6; }
        .char-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="login-box">
            <h1>Brawl Clone</h1>
            <input type="text" id="nameInput" placeholder="名前..." maxlength="10"><br>
            <div class="char-grid">
                <button class="char-btn shelly" onclick="launchGame('shelly')">シェリー</button>
                <button class="char-btn spike" onclick="launchGame('spike')">スパイク</button>
                <button class="char-btn edgar" onclick="launchGame('edgar')">エドガー</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
