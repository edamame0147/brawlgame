<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; font-family: sans-serif;">
        <div style="text-align: center; color: white;">
            <h1 style="margin-bottom: 30px;">キャラクターを選択</h1>
            <div style="display: flex; gap: 20px;">
                <button onclick="launchGame('shelly')" style="padding: 20px 40px; font-size: 24px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer;">シェリー</button>
                <button onclick="launchGame('spike')" style="padding: 20px 40px; font-size: 24px; background: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer;">スパイク</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
